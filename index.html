  <style>
    :root{
      --teal:#00ACC1; --coffee:#AD774E; --orange:#C47623; --mint:#1BBAA0; --slate:#797B86;
      --bg:#F8F4EC; --bg2:#F1ECDF; --ink:#5A5246; --thread:rgba(173,119,78,.62);
    }
    html[data-mode="day"]{ --bg:#F8F4EC; --bg2:#F1ECDF; --ink:#5A5246; --thread:rgba(173,119,78,.62); }
    html[data-mode="night"]{ --bg:#222120; --bg2:#1A1918; --ink:#D8CEBC; --thread:rgba(0,172,193,.6); }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);font-family:'Fredoka',ui-rounded,system-ui,sans-serif;color:var(--ink);
      transition:background .9s ease;-webkit-font-smoothing:antialiased;touch-action:none}

    #web{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
    #web line{stroke:var(--thread);stroke-width:2.4;stroke-linecap:round;transition:opacity .5s ease}

    #grid{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);display:grid;z-index:1;
      user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
    .cell{position:relative;display:grid;place-items:center}
    .bubble{position:absolute;width:80%;aspect-ratio:1;border-radius:50%;background:var(--teal);
      transform:scale(0);opacity:0;z-index:0;
      transition:transform .34s cubic-bezier(.2,.9,.3,1.4),opacity .3s}
    .cell.lit .bubble{transform:scale(1);opacity:1}
    .card{position:relative;width:62%;height:62%;z-index:1;perspective:560px;color:var(--c,var(--teal));
      transition:transform .5s cubic-bezier(.34,1.56,.5,1),color .25s ease,opacity .28s ease}
    .cell.lit .card{transform:scale(1.32);color:var(--bg)}
    .cell.door{cursor:pointer}
    .flip{position:relative;width:100%;height:100%;transform-style:preserve-3d;
      transition:transform .5s cubic-bezier(.2,.85,.3,1.25)}
    .flip.on{transform:rotateY(180deg)}
    .face{position:absolute;inset:0;backface-visibility:hidden;display:grid;place-items:center}
    .face svg{width:100%;height:100%;overflow:visible}
    .face.back{transform:rotateY(180deg)}
    .wm{font-family:'Bagel Fat One',sans-serif;font-weight:400;line-height:1;letter-spacing:-.02em}

    .mark{position:fixed;z-index:4;pointer-events:none;display:grid;place-items:center}
    .mark svg{width:100%;height:100%;overflow:visible}

    #tag{position:fixed;left:clamp(18px,4.5vw,40px);top:clamp(20px,4.8vw,40px);z-index:5;
      font-size:12px;font-weight:400;letter-spacing:.04em;color:var(--ink);opacity:.6;
      display:flex;align-items:center;gap:8px;user-select:none;-webkit-user-select:none}
    #tag b{font-weight:600} #tag i{font-style:normal;color:var(--coffee)} #n{font-variant-numeric:tabular-nums}

    #keep{position:fixed;left:50%;bottom:clamp(22px,6vh,52px);transform:translateX(-50%);
      display:flex;align-items:center;z-index:5;background:var(--bg2);border-radius:999px;
      box-shadow:0 6px 22px rgba(0,0,0,.12);transition:background .9s ease}
    #keep .pill{border:none;background:var(--teal);color:#fff;cursor:pointer;
      font:500 14px/1 'Fredoka',sans-serif;padding:13px 22px;border-radius:999px;white-space:nowrap;
      transition:transform .2s,background .25s}
    #keep .pill:hover{transform:translateY(-1px)}
    #keep.open .pill{background:var(--coffee);border-radius:0 999px 999px 0;padding:13px 18px}
    #keep input{width:0;opacity:0;border:none;background:none;outline:none;
      font:400 14px/1 'Fredoka',sans-serif;color:var(--ink);padding:0;
      transition:width .4s ease,opacity .3s,padding .4s}
    #keep.open input{width:min(52vw,210px);opacity:1;padding:0 6px 0 20px}
    #keep.kept .pill{background:var(--mint)}

    .sr{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}
    :focus-visible{outline:3px solid var(--teal);outline-offset:3px;border-radius:6px}
    @media (prefers-reduced-motion:reduce){.flip,.card,#web line{transition:none}}
  </style>
</head>

  <svg id="web" aria-hidden="true"></svg>
  <div id="grid" aria-hidden="true"></div>

  <div id="tag" aria-hidden="true"><b>weever<i>.</i></b><span id="n">0</span> threads</div>

  <form id="keep" autocomplete="off">
    <input type="email" id="email" placeholder="where to find you, later" aria-label="Your email" />
    <button type="submit" class="pill">leave a thread</button>
  </form>

  <p class="sr">weever. Something is being woven.<br>
  salt is an agent<br>
  drawing water from the leaf<br>
  so does a good question<br>
  A quiet place for the work you keep coming back to. It stays yours, and it stays where you are. Not open yet. Leave a thread and we will find you when it is woven.</p>
